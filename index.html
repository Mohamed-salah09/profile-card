<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card UI Design</title>
    <link rel="stylesheet" href="CSS/style.css">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet' integrity="anonymous" crossorigin="anonymous">

</head>

<body>

    <div class="profile-card">
        <div class="image">
            <img src="imgs/myphoto.jpeg" alt="Profile+" class="profile-img" height="300" width="300">
        </div>

        <div class="text-data">
            <span class="name">Mohamed Salah</span>
            <span class="job">Student @FCAI</span>
        </div>

        <div class="media-buttons">
            <a href="#" style="background:blue;" class="link">
                <i class='bx bxl-linkedin'></i>
            </a>

            <a href="#" style="background: #e1306c ;" class="link">
                <i class='bx bxl-instagram'></i>
            </a>

            <a href="#" style="background: #4267b2 ;" class="link">
                <i class='bx bxl-facebook'></i>
            </a>

            <a href="#" style="background: #1da1f2 ;" class="link">
                <i class='bx bxl-twitter'></i>
            </a>
        </div>

        <div class="buttons">
            <button class="button">Message</button>
            <button class="button">About</button>
        </div>

        <div class="analytics">
            <div class="data">
                <i class='bx bx-heart'></i>
                <span class="number">60K</span>
            </div>

            <div class="data">
                <i class='bx bx-message-rounded'></i>
                <span class="number">20K</span>
            </div>

            <div class="data">
                <i class='bx bx-share'></i>
                <span class="number">12K</span>
            </div>
        </div>
    </div>

</body>

</html>
